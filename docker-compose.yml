services:
  attendify:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_PORT: 3306
      MYSQL_DATABASE: attendance_system
      MYSQL_USER: attendance
      MYSQL_PASSWORD: attendance_password
      MYSQL_ROOT_PASSWORD: root_password
      JWT_SECRET: ZmFrZS1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXM=
    volumes:
      - mariadb-data:/var/lib/mysql

volumes:
  mariadb-data:
