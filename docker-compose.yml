services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: attendance_system
      DB_USERNAME: attendance
      DB_PASSWORD: attendance_password
      JWT_SECRET: ZmFrZS1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXM=
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: attendance_system
      MARIADB_USER: attendance
      MARIADB_PASSWORD: attendance_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb-data:
