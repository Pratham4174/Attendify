spring.application.name=system
server.port=${PORT:8080}
spring.datasource.url=${DB_URL:jdbc:mariadb://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:attendance_system}}
spring.datasource.username=${DB_USERNAME:attendance}
spring.datasource.password=${DB_PASSWORD:attendance_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.security.jwt-secret=${JWT_SECRET:ZmFrZS1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXM=}
app.security.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}
